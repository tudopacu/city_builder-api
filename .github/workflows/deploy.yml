name: Build and Deploy Go Gin API to Home K8s

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase Repository Name for Docker
        run: |
          echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and Push Lightweight Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          driver: docker
          push: true
          no-cache: true # Ensures your latest Go code changes are always compiled fresh
          tags: ghcr.io/${{ env.IMAGE_NAME }}:latest
          # CRITICAL ROUTING FIX: Forces the isolated container to use your server's host internet connection
          network: host

  deploy-to-k8s:
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Deploy Manifest and Restart Pods
        run: |
          # 1. Apply any infrastructure updates to the Go manifest
          kubectl apply -f ~/k8s/golang-api.yaml
          
          # 2. Force terminate the old pod to instantly free up physical hostPort 8081
          kubectl scale deployment golang-api-deployment --replicas=0
          
          # 3. Spin up the fresh pod (forces K8s to fetch the new image from GHCR due to imagePullPolicy: Always)
          kubectl scale deployment golang-api-deployment --replicas=1
          
          # 4. Guardrail: Wait until the Gin container is fully operational before ending the job
          kubectl rollout status deployment/golang-api-deployment --timeout=60s